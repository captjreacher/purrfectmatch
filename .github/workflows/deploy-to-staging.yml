name: Deploy PetFilth to staging

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Checkout prod-staging
        uses: actions/checkout@v4
        with:
          repository: captjreacher/prod-staging
          token: ${{ secrets.STAGING_DEPLOY_TOKEN }}
          path: prod-staging

      - name: Copy build into slug folder
        run: |
          rm -rf prod-staging/petfilth
          mkdir -p prod-staging/petfilth
          cp -R dist/* prod-staging/petfilth/

      - name: Commit and push staging update
        run: |
          cd prod-staging
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy PetFilth staging" || echo "No changes to commit"
          git push
