name: Deploy to Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  APP_SLUG: petfilth
  SERVER_DIR: ./staging.maximisedai.com/petfilth/

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Validate build output
        run: |
          test -d dist || (echo "❌ dist/ directory not found" && exit 1)
          test -f dist/index.html || (echo "❌ dist/index.html not found" && exit 1)
          echo "✅ Build validated: $(find dist -type f | wc -l) files ready"

      - name: Validate FTP secrets
        run: |
          test -n "${{ secrets.STAGING_FTP_SERVER || secrets.FTP_SERVER }}" || (echo "❌ Missing FTP server secret. Add STAGING_FTP_SERVER or FTP_SERVER in repo Settings > Secrets and variables > Actions." && exit 1)
          test -n "${{ secrets.STAGING_FTP_USERNAME || secrets.FTP_USERNAME }}" || (echo "❌ Missing FTP username secret. Add STAGING_FTP_USERNAME or FTP_USERNAME in repo Settings > Secrets and variables > Actions." && exit 1)
          test -n "${{ secrets.STAGING_FTP_PASSWORD || secrets.FTP_PASSWORD }}" || (echo "❌ Missing FTP password secret. Add STAGING_FTP_PASSWORD or FTP_PASSWORD in repo Settings > Secrets and variables > Actions." && exit 1)

      - name: Deploy to staging via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.STAGING_FTP_SERVER || secrets.FTP_SERVER }}
          username: ${{ secrets.STAGING_FTP_USERNAME || secrets.FTP_USERNAME }}
          password: ${{ secrets.STAGING_FTP_PASSWORD || secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ${{ env.SERVER_DIR }}
          dangerous-clean-slate: false

      - name: Deployment summary
        run: |
          echo "## 🚀 Deployed to Staging" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://staging.maximisedai.com/${{ env.APP_SLUG }}/" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
