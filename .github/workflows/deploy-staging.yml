name: Deploy to Staging

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual trigger

env:
  APP_SLUG: petfilth
  SERVER_DIR: /staging.maximisedai.com/petfilth/
FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: True

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Validate build output
        run: |
          test -d dist || (echo "❌ dist/ directory not found" && exit 1)
          test -f dist/index.html || (echo "❌ dist/index.html not found" && exit 1)
          echo "✅ Build validated: $(find dist -type f | wc -l) files ready"

      - name: Deploy to staging via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ${{ env.SERVER_DIR }}
          dangerous-clean-slate: false  # Don't delete files not in dist/

      - name: Deployment summary
        run: |
          echo "## 🚀 Deployed to Staging" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://staging.maximisedai.com/${{ env.APP_SLUG }}/" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
